<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D点云协作标注系统</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="container">
        <div id="toolbar">
            <div class="tool-group">
                <label>模型:</label>
                <select id="modelSelect"></select>
                <button id="uploadBtn">上传模型</button>
                <input type="file" id="fileInput" accept=".obj,.gltf,.glb" style="display:none">
            </div>
            <div class="tool-group">
                <label>体素分辨率:</label>
                <select id="resolutionSelect">
                    <option value="32">32</option>
                    <option value="64" selected>64</option>
                    <option value="128">128</option>
                    <option value="256">256</option>
                </select>
                <button id="voxelizeBtn">体素化</button>
            </div>
            <div class="tool-group">
                <label>选择模式:</label>
                <button id="modePoint" class="active">点选</button>
                <button id="modeBox">框选</button>
                <button id="modeSemiAuto">半自动</button>
                <button id="releaseLockBtn" style="display:none">释放锁</button>
            </div>
        </div>

        <div id="left-panel">
            <h3>标签列表</h3>
            <div id="tagInputGroup">
                <input type="text" id="newTagInput" placeholder="输入新标签（如：车门）">
                <button id="addTagBtn">添加</button>
            </div>
            <div id="tagList"></div>
            <h3 style="margin-top:20px">当前选中标签</h3>
            <select id="currentTagSelect" size="5"></select>
            <div id="semiAutoPanel" style="display:none;margin-top:20px">
                <h3>智能补全</h3>
                <div style="font-size:12px;color:#aaa;margin-bottom:8px">
                    步骤：<br>
                    1. 为每个标签选种子点<br>
                    2. 点击「执行扩散」<br>
                    3. 预览确认后入库
                </div>
                <div id="seedSummary" style="font-size:12px;margin-bottom:8px;padding:8px;background:#0f3460;border-radius:4px">
                    暂无种子点
                </div>
                <label>算法:</label>
                <select id="segmentMethodSelect">
                    <option value="auto">自动选择</option>
                    <option value="region_growing">区域增长</option>
                    <option value="graph_cut">多标签图割</option>
                </select>
                <div style="margin-top:8px;display:flex;gap:5px">
                    <button id="runSegmentBtn">执行扩散</button>
                    <button id="clearSeedsBtn">清空种子</button>
                </div>
                <div id="previewPanel" style="display:none;margin-top:10px;padding:8px;background:#0f3460;border-radius:4px">
                    <div style="font-size:12px;color:#4fc3f7;margin-bottom:6px">预览结果：</div>
                    <div id="previewSummary" style="font-size:12px;margin-bottom:8px"></div>
                    <div style="display:flex;gap:5px">
                        <button id="confirmSegmentBtn" style="background:#2ecc71;border-color:#2ecc71">确认入库</button>
                        <button id="cancelSegmentBtn" style="background:#e74c3c;border-color:#e74c3c">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="viewer"></div>

        <div id="right-panel">
            <h3>在线用户</h3>
            <div id="userList"></div>
            <h3 style="margin-top:20px">你的信息</h3>
            <div id="myInfo">
                <div><label>昵称:</label><input type="text" id="usernameInput" placeholder="输入昵称"></div>
                <div><label>颜色:</label><input type="color" id="userColorInput" value="#ff0000"></div>
                <button id="saveUserBtn">保存</button>
            </div>
            <h3 style="margin-top:20px">锁状态</h3>
            <div id="lockStatus" style="font-size:12px;color:#aaa">
                <div id="lockInfo" style="display:none">
                    <div class="stat-row">
                        <span>当前锁定</span>
                        <span id="lockOwner" style="color:#ff5555"></span>
                    </div>
                    <div class="stat-row">
                        <span>锁定点数</span>
                        <span id="lockPointCount">0</span>
                    </div>
                </div>
                <div id="noLockInfo">当前无区域被锁定</div>
            </div>
            <h3 style="margin-top:20px">标注统计</h3>
            <div id="stats"></div>
            <h3 style="margin-top:20px">版本历史</h3>
            <div style="display:flex;gap:5px;margin-bottom:8px">
                <input type="text" id="versionNameInput" placeholder="版本名称（可选）" style="flex:1;padding:4px">
                <button id="saveVersionBtn" style="padding:4px 8px">保存版本</button>
            </div>
            <div id="versionList" style="max-height:250px;overflow-y:auto;font-size:12px">
                <div style="color:#aaa">暂无保存版本</div>
            </div>
        </div>
    </div>

    <div id="selectionBox" class="hidden"></div>
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loadingText">加载中...</p>
    </div>
    <div id="toast" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>
